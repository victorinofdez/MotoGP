version: 2

models:
  - name: dim_rider_team
    description: >
      Dimensión SCD2 del histórico de equipo y categoría por piloto.
      Rastrea cambios infra-anuales confirmados en Bronze (wild cards,
      sustituciones por lesión, pilotos en varias categorías).
      Grain: un registro por estado válido de rider_team_id.
    columns:
      - name: dbt_scd_id
        description: PK surrogate generada por dbt para cada versión del registro
        tests:
          - not_null
          - unique
      - name: rider_team_id
        description: ID natural del registro
        tests:
          - not_null
      - name: rider_id
        description: FK a dim_rider
        tests:
          - not_null
      - name: team_id
        description: FK a dim_team. Puede ser nulo en casos de wild cards sin equipo asignado.
      - name: category_id
        description: FK a dim_category
        tests:
          - not_null
      - name: season_year
        description: Temporada a la que corresponde el registro
      - name: current_career_step_season
        description: Indicador del paso actual en la carrera del piloto ese año
      - name: rider_in_grid
        description: Si el piloto estaba en parrilla ese año
      - name: dbt_valid_from
        description: Fecha desde la que este estado es válido
        tests:
          - not_null
      - name: dbt_valid_to
        description: Fecha hasta la que este estado es válido. NULL si es el registro activo
      - name: is_current
        description: True si es el estado actual del piloto
      - name: bike_picture_url
        description: Url de la foto de la moto.
      - name: helmet_picture_url,  
        description: Url de la foto del casco del piloto.

  - name: dim_team
    description: >
      Dimensión de equipos. Grain: un registro por equipo.
    columns:
      - name: team_id
        description: PK del equipo
        tests:
          - not_null
          - unique
      - name: team_name
        description: Nombre del equipo
        tests:
          - not_null
      - name: team_legacy_id
        description: ID legacy del equipo

  - name: fct_rider_season
    description: >
      Fact table con el rendimiento agregado de cada piloto por equipo,
      constructor, categoría y temporada.
      Grain: un registro por piloto + team + constructor + categoría + año.
      Solo incluye sesiones de carrera (RAC, SPR).
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments: 
            combination_of_columns:
              - rider_id
              - team_id
              - constructor_id
              - category_id
              - year
    columns:
      - name: rider_id
        description: FK a dim_rider
        tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('dim_rider')
                field: rider_id
      - name: team_id
        description: FK a dim_team. Excluidos registros sin team_id en el modelo.
      - name: category_id
        description: FK a dim_category
        tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('dim_category')
                field: category_id
      - name: year
        description: Temporada
        tests:
          - not_null
      - name: total_entries
        description: Total de entradas en carrera ese año
      - name: total_points
        description: Suma de puntos del piloto ese año
      - name: victories
        description: Número de victorias (position = 1)
      - name: podiums
        description: Número de podios (position <= 3)
      - name: points_finishes
        description: Número de finales dentro de los puntos (position <= 10)
      - name: avg_position
        description: Posición media del piloto ese año
      - name: dnf_count
        description: Número de abandonos (status_category = DNF)
      - name: dnf_rate_pct
        description: Porcentaje de abandonos sobre el total de entradas
      - name: avg_top_speed
        description: Velocidad punta media del piloto ese año
      - name: max_top_speed
        description: Velocidad punta máxima registrada ese año